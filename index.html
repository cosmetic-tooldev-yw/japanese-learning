<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日文學習工具</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { background: #1c1c1e; }
  body {
    margin: 0; padding: 0; min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "PingFang TC", "Segoe UI", sans-serif;
    background: #1c1c1e;
    color: #fff;
  }
  #app {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 16px 16px calc(28px + env(safe-area-inset-bottom));
    padding-top: calc(40px + env(safe-area-inset-top));
    display: flex;
    flex-direction: column;
    background: #1c1c1e;
  }
  header { text-align: center; margin-bottom: 8px; }
  h1 { font-size: 24px; margin: 0; font-weight: 700; letter-spacing: 0.5px; }
  .subtitle { font-size: 13px; color: #9a9a9e; margin-top: 6px; }

  .card-list { display: flex; flex-direction: column; gap: 14px; margin-top: 32px; }

  .tool-card {
    display: block;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(145deg, #2c2c2e, #232325);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .tool-card:active { transform: scale(0.98); }
  .tool-card::before {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 90px; height: 90px;
    border-radius: 50%;
    opacity: 0.15;
    transform: translate(25px, -25px);
  }
  .tool-card.n5::before { background: #8FA876; }
  .tool-card.gojuon::before { background: #C17A4D; }

  .tool-icon { font-size: 28px; margin-bottom: 10px; display: block; }
  .tool-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .tool-desc { font-size: 13px; color: #9a9a9e; line-height: 1.5; }
  .tool-meta {
    display: inline-block;
    margin-top: 12px;
    font-size: 11px;
    color: #d0d0d5;
    background: rgba(255,255,255,0.08);
    padding: 4px 10px;
    border-radius: 100px;
  }

  footer {
    margin-top: auto;
    padding-top: 40px;
    text-align: center;
    font-size: 11px;
    color: #636366;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>日本語学習</h1>
    <div class="subtitle">日文學習工具集</div>
  </header>

  <div class="card-list">
    <a class="tool-card n5" href="./n5-vocab/">
      <div class="tool-title">N5 單字卡</div>
      <div class="tool-desc">N5 核心單字閃卡練習,依動詞、形容詞、時間等分類,可標記熟悉度並追蹤進度。</div>
      <span class="tool-meta">單字卡</span>
    </a>

    <a class="tool-card gojuon" href="./gojuon/">
      <div class="tool-title">五十音練習</div>
      <div class="tool-desc">平假名、片假名的清音、濁音、拗音練習,支援發音朗讀與總覽表檢視。</div>
      <span class="tool-meta">五十音</span>
    </a>
  </div>

  <footer>選擇一個工具開始學習</footer>
</div>
</body>
</html>
