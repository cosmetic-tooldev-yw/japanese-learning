<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日文學習工具</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1c1c1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日文學習">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { background: #1c1c1e; }
  body {
    margin: 0; padding: 0; min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "PingFang TC", "Segoe UI", sans-serif;
    background: #1c1c1e;
    color: #fff;
  }
  #app {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 16px 16px calc(28px + env(safe-area-inset-bottom));
    padding-top: calc(40px + env(safe-area-inset-top));
    display: flex;
    flex-direction: column;
    background: #1c1c1e;
  }
  header { text-align: center; margin-bottom: 8px; }
  h1 { font-size: 24px; margin: 0; font-weight: 700; letter-spacing: 0.5px; }
  .subtitle { font-size: 13px; color: #9a9a9e; margin-top: 6px; }

  .card-list { display: flex; flex-direction: column; gap: 14px; margin-top: 32px; }

  .tool-card {
    display: block;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(145deg, #2c2c2e, #232325);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .tool-card:active { transform: scale(0.98); }
  .tool-card::before {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 90px; height: 90px;
    border-radius: 50%;
    opacity: 0.15;
    transform: translate(25px, -25px);
  }
  .tool-card.n5::before { background: #8FA876; }
  .tool-card.gojuon::before { background: #C17A4D; }

  .tool-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; }

  .tool-progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #9a9a9e;
    margin-bottom: 8px;
  }
  .tool-progress-row b { color: #fff; font-weight: 700; }
  .tool-progress-track {
    position: relative;
    height: 8px;
    border-radius: 100px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
    display: flex;
  }
  .tool-progress-known { background: #8FA876; height: 100%; transition: width 0.3s; }
  .tool-progress-review { background: #C17A4D; height: 100%; transition: width 0.3s; }

  footer {
    margin-top: auto;
    padding-top: 40px;
    text-align: center;
    font-size: 11px;
    color: #636366;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>日本語学習</h1>
    <div class="subtitle">日文學習工具集</div>
  </header>

  <div class="card-list">
    <a class="tool-card n5" href="./n5-vocab/">
      <div class="tool-title">N5 單字卡</div>
      <div class="tool-progress-row">
        <span id="n5-label">尚未開始</span>
        <span><b id="n5-known">0</b> 已熟悉 ・ <b id="n5-total">0</b> 總數</span>
      </div>
      <div class="tool-progress-track">
        <div class="tool-progress-known" id="n5-bar-known" style="width:0%"></div>
        <div class="tool-progress-review" id="n5-bar-review" style="width:0%"></div>
      </div>
    </a>

    <a class="tool-card gojuon" href="./gojuon/">
      <div class="tool-title">五十音練習</div>
      <div class="tool-progress-row">
        <span id="gojuon-label">尚未開始</span>
        <span><b id="gojuon-known">0</b> 已熟悉 ・ <b id="gojuon-total">0</b> 總數</span>
      </div>
      <div class="tool-progress-track">
        <div class="tool-progress-known" id="gojuon-bar-known" style="width:0%"></div>
        <div class="tool-progress-review" id="gojuon-bar-review" style="width:0%"></div>
      </div>
    </a>
  </div>

  <footer>選擇一個工具開始學習</footer>
</div>
<script>
function loadSummary(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function renderProgress(prefix, key) {
  const s = loadSummary(key);
  const known = s ? s.known : 0;
  const review = s ? s.review : 0;
  const total = s ? s.total : 0;

  document.getElementById(prefix + "-known").textContent = known;
  document.getElementById(prefix + "-total").textContent = total;
  document.getElementById(prefix + "-bar-known").style.width = (total ? known/total*100 : 0) + "%";
  document.getElementById(prefix + "-bar-review").style.width = (total ? review/total*100 : 0) + "%";

  const label = document.getElementById(prefix + "-label");
  if (!s || total === 0) {
    label.textContent = "尚未開始";
  } else if (known === total) {
    label.textContent = "全部完成 🎉";
  } else {
    const pct = Math.round(known/total*100);
    label.textContent = pct + "% 完成";
  }
}

renderProgress("n5", "n5-vocab-summary");
renderProgress("gojuon", "gojuon-summary");
</script>
</body>
</html>
