    background: rgba(255,255,255,0.08);

    color: #fff;

  .stats-bar { margin-top: 14px; background: rgba(255,255,255,0.06); border-radius: 16px; padding: 12px 14px; }

  .progress-track { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; display: flex; }
  .progress-known { background: #8FA876; height: 100%; transition: width 0.3s; }
  .progress-review { background: #C17A4D; height: 100%; transition: width 0.3s; }
  .filters { display: flex; gap: 8px; margin-top: 14px; }
  select { flex: 1; background: rgba(255,255,255,0.08); color: #fff; border: none; border-radius: 12px; padding: 10px 8px; font-size: 13px; text-align: center; appearance: none; -webkit-appearance: none; }

  .card-scene { width: 100%; max-width: 340px; height: 230px; perspective: 1200px; }

  .face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-shadow: 0 8px 28px rgba(0,0,0,0.35); }
  .face-front { background: linear-gradient(145deg, #3a3a3c, #232325); border: 1px solid rgba(255,255,255,0.08); }
  .face-back { background: linear-gradient(145deg, #f6efe0, #efe4cf); color: #2b2b2d; transform: rotateY(180deg); }
  .face-back .tag { background: rgba(43,43,45,0.08); color: #2b2b2d; }
  .tag { position: absolute; top: 14px; left: 14px; font-size: 11px; background: rgba(255,255,255,0.12); padding: 4px 10px; border-radius: 100px; color: #d0d0d5; }
  .status-dot { position: absolute; top: 14px; right: 14px; width: 10px; height: 10px; border-radius: 50%; }
  .word-main { font-size: 36px; font-weight: 600; text-align: center; line-height: 1.3; }
  .tap-hint { font-size: 11px; color: #8e8e93; margin-top: 10px; }
  .reading { font-size: 20px; font-weight: 500; margin-bottom: 4px; opacity: 0.85; color: #2b2b2d; }
  .romaji { font-size: 13px; font-style: italic; opacity: 0.55; margin-bottom: 10px; color: #2b2b2d; }
  .meaning { font-size: 22px; font-weight: 700; color: #2b2b2d; text-align: center; }
  .actions { display: flex; gap: 10px; margin-top: 20px; width: 100%; max-width: 340px; }
  .actions button { flex: 1; border: none; border-radius: 16px; padding: 14px 8px; font-size: 14px; font-weight: 600; }
  .btn-review { background: #C17A4D; color: #fff; }
  .btn-known { background: #8FA876; color: #fff; }
  .nav-row { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 18px; }
  .nav-btn { background: rgba(255,255,255,0.08); border: none; color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; }

  .empty-state { text-align: center; color: #8e8e93; font-size: 14px; padding: 40px 20px; }
  .save-indicator { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #636366; opacity: 0; transition: opacity 0.3s; }

const STORAGE_KEY = "n5-vocab-progress-v2";
let progress = {};
let filteredList = [];
let currentIdx = 0;
let isFlipped = false;
let shuffleMode = false;
let saveTimer = null;

const cardArea = document.getElementById("cardArea");
const categoryFilter = document.getElementById("categoryFilter");
const statusFilter = document.getElementById("statusFilter");
const saveIndicator = document.getElementById("saveIndicator");

function buildCategoryOptions() {
  const cats = ["全部", ...new Set(VOCAB.map(v => v.category))];
  categoryFilter.innerHTML = cats.map(c => `<option value="${c}">${c === "全部" ? "全部分類" : c}</option>`).join("");
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) progress = JSON.parse(raw);
  } catch(e) { progress = {}; }
}

function saveProgress() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      saveIndicator.classList.add("show");
      setTimeout(() => saveIndicator.classList.remove("show"), 900);
    } catch(e) {}
  }, 250);
}

function applyFilters() {
  const cat = categoryFilter.value;
  const stat = statusFilter.value;
  filteredList = VOCAB.filter(v => {
    if (cat !== "全部" && v.category !== cat) return false;
    const s = progress[v.id] || "new";
    if (stat !== "all" && s !== stat) return false;
    return true;
  });
  if (shuffleMode) filteredList = [...filteredList].sort(() => Math.random() - 0.5);
  currentIdx = 0;
  isFlipped = false;
  renderCard();
}

function updateStats() {
  const total = VOCAB.length;
  let known = 0, review = 0;
  VOCAB.forEach(v => {
    if (progress[v.id] === "known") known++;
    else if (progress[v.id] === "review") review++;
  });
  document.getElementById("statKnown").textContent = known;
  document.getElementById("statReview").textContent = review;
  document.getElementById("statTotal").textContent = total;
  document.getElementById("progKnown").style.width = (known/total*100) + "%";
  document.getElementById("progReview").style.width = (review/total*100) + "%";
}

function statusColor(s) {
  if (s === "known") return "#8FA876";
  if (s === "review") return "#C17A4D";
  return "#636366";
}

function renderCard() {
  updateStats();
  if (filteredList.length === 0) {
    cardArea.innerHTML = `<div class="empty-state">這個篩選條件下沒有單字<br>試試切換分類或狀態</div>`;
    return;
  }
  const w = filteredList[currentIdx];
  const s = progress[w.id] || "new";
  cardArea.innerHTML = `
    <div class="card-counter">${currentIdx+1} / ${filteredList.length}</div>
    <div class="card-scene">
      <div class="card ${isFlipped?"flipped":""}" id="flipCard">
        <div class="face face-front">
          <span class="tag">${w.category}</span>
          <span class="status-dot" style="background:${statusColor(s)}"></span>
          <div class="word-main">${w.kanji}</div>
          <div class="tap-hint">點擊翻面看意思</div>
        </div>
        <div class="face face-back">
          <span class="tag">${w.category}</span>
          ${w.reading !== w.kanji ? `<div class="reading">${w.reading}</div>` : ""}
          <div class="romaji">${w.romaji}</div>
          <div class="meaning">${w.meaning}</div>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn-review" id="reviewBtn">需加強</button>
      <button class="btn-known" id="knownBtn">已熟悉</button>
    </div>`;
  document.getElementById("flipCard").addEventListener("click", () => {
    isFlipped = !isFlipped;
    document.getElementById("flipCard").classList.toggle("flipped", isFlipped);
  });
  document.getElementById("reviewBtn").addEventListener("click", () => markStatus(w.id, "review"));
  document.getElementById("knownBtn").addEventListener("click", () => markStatus(w.id, "known"));
}

function markStatus(id, s) {
  progress[id] = s;
  saveProgress();
  updateStats();
  goNext();
}

function goNext() {
  if (!filteredList.length) return;
  isFlipped = false;
  currentIdx = (currentIdx+1) % filteredList.length;
  renderCard();
}

function goPrev() {
  if (!filteredList.length) return;
  isFlipped = false;
  currentIdx = (currentIdx-1+filteredList.length) % filteredList.length;
  renderCard();
}

document.getElementById("nextBtn").addEventListener("click", goNext);
document.getElementById("prevBtn").addEventListener("click", goPrev);
document.getElementById("shuffleBtn").addEventListener("click", e => {
  shuffleMode = !shuffleMode;
  e.target.classList.toggle("active", shuffleMode);
  applyFilters();
});
categoryFilter.addEventListener("change", applyFilters);
statusFilter.addEventListener("change", applyFilters);
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("確定要清除所有學習進度嗎?這個動作無法復原。")) {
    progress = {};
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch(e) {}
    updateStats();
    applyFilters();
  }
});

(function init() {
  buildCategoryOptions();
  loadProgress();
  applyFilters();
})();
</script>
