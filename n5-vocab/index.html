<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>N5 日文單字卡</title>
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#1c1c1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="N5 單字卡">
<link rel="apple-touch-icon" href="../icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="../icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html {
    background: #1c1c1e;
  }
  body {
    margin: 0; padding: 0; min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "PingFang TC", "Segoe UI", sans-serif;
    background: #1c1c1e;
    color: #fff;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  #app {
    max-width: 460px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: 16px 16px calc(28px + env(safe-area-inset-bottom));
    padding-top: calc(16px + env(safe-area-inset-top));
    display: flex;
    flex-direction: column;
    background: #1c1c1e;
  }
  header { text-align: center; padding: 8px 0 4px; position: relative; }
  .home-btn {
    position: absolute;
    left: 0; top: 6px;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: none;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .home-btn:active { background: rgba(255,255,255,0.18); }
  h1 { font-size: 20px; margin: 0; font-weight: 600; letter-spacing: 0.5px; }
  .subtitle { font-size: 12px; color: #9a9a9e; margin-top: 4px; }
  .stats-bar { margin-top: 14px; background: rgba(255,255,255,0.06); border-radius: 16px; padding: 12px 14px; }
  .stats-row { display: flex; justify-content: space-between; font-size: 12px; color: #c7c7cc; margin-bottom: 8px; }
  .stats-row b { color: #fff; font-size: 13px; }
  .progress-track { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; display: flex; }
  .progress-known { background: #8FA876; height: 100%; transition: width 0.3s; }
  .progress-review { background: #C17A4D; height: 100%; transition: width 0.3s; }
  .filters { display: flex; gap: 8px; margin-top: 14px; }
  select { display: none; }
  .dd { position: relative; flex: 1; }
  .dd-btn {
    width: 100%; background: rgba(255,255,255,0.08); color: #e4e4e7;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 10px 12px; font-size: 13px; text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-family: inherit;
  }
  .dd-btn .dd-chevron { width: 12px; height: 12px; flex-shrink: 0; transition: transform 0.2s; opacity: 0.6; }
  .dd.open .dd-btn .dd-chevron { transform: rotate(180deg); }
  .dd-panel {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 40;
    background: #232325; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 6px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.45);
    max-height: 280px; overflow-y: auto;
    display: none;
  }
  .dd.open .dd-panel { display: block; }
  .dd-opt {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    position: relative;
    padding: 10px 10px; border-radius: 9px; font-size: 14px; color: #e4e4e7;
  }
  .dd-opt:hover { background: rgba(255,255,255,0.1); }
  .dd-opt:active { background: rgba(255,255,255,0.16); }
  .dd-opt.selected { color: #fff; font-weight: 600; }
  .dd-opt .dd-check {
    position: absolute; left: 10px; width: 14px; height: 14px; opacity: 0;
    color: #8FA876;
  }
  .dd-opt.selected .dd-check { opacity: 1; }
  .card-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 18px; min-height: 260px; }
  .card-counter { font-size: 12px; color: #8e8e93; margin-bottom: 10px; }
  .card-scene { width: 100%; max-width: 340px; height: 230px; perspective: 1200px; }
  .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(.4,.2,.2,1); cursor: pointer; }
  .card.flipped { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-shadow: 0 8px 28px rgba(0,0,0,0.35); }
  .face-front { background: linear-gradient(145deg, #3a3a3c, #232325); border: 1px solid rgba(255,255,255,0.08); }
  .face-back { background: linear-gradient(145deg, #f6efe0, #efe4cf); color: #2b2b2d; transform: rotateY(180deg); }
  .face-back .tag { background: rgba(43,43,45,0.08); color: #2b2b2d; }
  .tag { position: absolute; top: 14px; left: 14px; font-size: 11px; background: rgba(255,255,255,0.12); padding: 4px 10px; border-radius: 100px; color: #d0d0d5; }
  .status-dot { position: absolute; top: 14px; right: 14px; width: 10px; height: 10px; border-radius: 50%; }
  .sound-btn {
    position: absolute; bottom: 14px; right: 14px;
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(43,43,45,0.08); border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: #2b2b2d;
  }
  .sound-btn:active { background: rgba(43,43,45,0.18); }
  .sound-btn-front {
    position: absolute; bottom: 14px; right: 14px;
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: #fff;
  }
  .sound-btn-front:active { background: rgba(255,255,255,0.2); }
  .word-main { font-size: 36px; font-weight: 600; text-align: center; line-height: 1.3; }
  .tap-hint { font-size: 11px; color: #8e8e93; margin-top: 10px; }
  .reading { font-size: 20px; font-weight: 500; margin-bottom: 4px; opacity: 0.85; color: #2b2b2d; }
  .romaji { font-size: 13px; font-style: italic; opacity: 0.55; margin-bottom: 10px; color: #2b2b2d; }
  .meaning { font-size: 22px; font-weight: 700; color: #2b2b2d; text-align: center; }
  .actions { display: flex; gap: 10px; margin-top: 20px; width: 100%; max-width: 340px; }
  .actions button { flex: 1; border: none; border-radius: 16px; padding: 14px 8px; font-size: 14px; font-weight: 600; }
  .btn-review { background: #C17A4D; color: #fff; }
  .btn-known { background: #8FA876; color: #fff; }
  .nav-row { display: flex; align-items: center; justify-content: center; gap: 18px; margin-top: 18px; }
  .nav-btn { background: rgba(255,255,255,0.08); border: none; color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .nav-btn:active { background: rgba(255,255,255,0.18); }
  .shuffle-btn { background: rgba(255,255,255,0.08); border: none; color: #fff; border-radius: 100px; padding: 10px 16px; font-size: 13px; }
  .shuffle-btn.active { background: #fff; color: #1c1c1e; }
  .footer-row { display: flex; justify-content: center; margin-top: 18px; }
  .reset-link { font-size: 12px; color: #636366; background: none; border: none; padding: 6px; }
  .empty-state { text-align: center; color: #8e8e93; font-size: 14px; padding: 40px 20px; }
  .save-indicator { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #636366; opacity: 0; transition: opacity 0.3s; }
  .save-indicator.show { opacity: 1; }
  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    background: rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 4px;
  }
  .mode-tab {
    flex: 1;
    text-align: center;
    padding: 10px 4px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    color: #9a9a9e;
    background: transparent;
    border: none;
  }
  .mode-tab.active { background: #fff; color: #1c1c1e; }
  .grid-view { margin-top: 18px; }
  .grid-group { margin-bottom: 18px; }
  .grid-group-title { font-size: 12px; color: #8e8e93; margin-bottom: 8px; padding-left: 2px; }
  .grid-cells { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .grid-cell {
    aspect-ratio: 1; background: rgba(255,255,255,0.06); border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: none; color: #fff; position: relative; padding: 4px;
    transition: background 0.15s;
  }
  .grid-cell:active { background: rgba(255,255,255,0.12); }
  .grid-cell .k { font-size: 18px; font-weight: 600; text-align: center; }
  .grid-cell .r { font-size: 10px; color: #9a9a9e; margin-top: 2px; text-align: center; }
  .grid-cell .m { font-size: 10px; color: #d0d0d5; margin-top: 2px; text-align: center; }
  .grid-cell.empty { background: transparent; }
  .grid-cell .dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; }

  .word-modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .word-modal-overlay.open { opacity: 1; pointer-events: auto; }
  .word-modal-card {
    width: 100%; max-width: 340px;
    background: linear-gradient(145deg, #f6efe0, #efe4cf); color: #2b2b2d;
    border-radius: 24px; padding: 28px 24px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.45);
    position: relative;
    transform: scale(0.92); transition: transform 0.2s;
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .word-modal-overlay.open .word-modal-card { transform: scale(1); }
  .word-modal-card .tag { position: absolute; top: 14px; left: 14px; background: rgba(43,43,45,0.08); color: #2b2b2d; }
  .word-modal-card .status-dot { position: absolute; top: 18px; right: 18px; }
  .word-modal-card .word-main { font-size: 32px; font-weight: 700; margin-top: 12px; }
  .word-modal-card .reading { font-size: 19px; margin-top: 10px; }
  .word-modal-card .romaji { font-size: 13px; margin-bottom: 8px; }
  .word-modal-card .meaning { font-size: 21px; margin-top: 4px; }
  .word-modal-card .sound-btn { position: static; margin-top: 16px; }
  .word-modal-card .actions { margin-top: 20px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <a class="home-btn" href="../index.html" aria-label="返回首頁">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"></path><path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"></path></svg>
    </a>
    <h1>N5 單字卡</h1>
    <div class="subtitle">N5 日文單字卡 ・ 進度自動儲存</div>
  </header>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="flash">閃卡練習</button>
    <button class="mode-tab" data-mode="grid">總覽表</button>
  </div>

  <div class="stats-bar">
    <div class="stats-row">
      <span>整體進度</span>
      <span><b id="statKnown">0</b> 已熟悉 ・ <b id="statReview">0</b> 需加強 ・ <b id="statTotal">0</b> 總數</span>
    </div>
    <div class="progress-track">
      <div class="progress-known" id="progKnown" style="width:0%"></div>
      <div class="progress-review" id="progReview" style="width:0%"></div>
    </div>
  </div>

  <div class="filters">
    <div class="dd" id="categoryDD">
      <button type="button" class="dd-btn" id="categoryDDBtn">
        <span id="categoryDDLabel">全部分類</span>
        <svg class="dd-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>
      <div class="dd-panel" id="categoryDDPanel"></div>
    </div>
    <select id="categoryFilter"></select>
  </div>

  <div id="flashView">
    <div class="filters" style="margin-top:8px;">
      <div class="dd" id="statusDD">
        <button type="button" class="dd-btn" id="statusDDBtn">
          <span id="statusDDLabel">全部狀態</span>
          <svg class="dd-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div class="dd-panel" id="statusDDPanel"></div>
      </div>
      <select id="statusFilter">
        <option value="all">全部狀態</option>
        <option value="new">未學習</option>
        <option value="review">需加強</option>
        <option value="known">已熟悉</option>
      </select>
    </div>

    <div class="card-area" id="cardArea"></div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn">‹</button>
      <button class="shuffle-btn" id="shuffleBtn">隨機</button>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>

    <div class="footer-row">
      <button class="reset-link" id="resetBtn">清除單字卡進度</button>
    </div>
  </div>

  <div id="gridView" class="grid-view" style="display:none;"></div>
</div>

<div class="word-modal-overlay" id="wordModalOverlay">
  <div class="word-modal-card" id="wordModalCard"></div>
</div>
<div class="save-indicator" id="saveIndicator">已儲存</div>
<script>
let VOCAB = [];

const STORAGE_KEY = "n5-vocab-progress-v2";
let progress = {};
let filteredList = [];
let currentIdx = 0;
let isFlipped = false;
let shuffleMode = false;
let saveTimer = null;
let currentView = "flash";

const cardArea = document.getElementById("cardArea");
const categoryFilter = document.getElementById("categoryFilter");
const statusFilter = document.getElementById("statusFilter");
const saveIndicator = document.getElementById("saveIndicator");
const gridView = document.getElementById("gridView");
const flashView = document.getElementById("flashView");

const CHECK_ICON = '<svg class="dd-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

function buildDropdown(prefix, options) {
  const dd = document.getElementById(prefix + "DD");
  const panel = document.getElementById(prefix + "DDPanel");
  const label = document.getElementById(prefix + "DDLabel");
  const nativeSelect = document.getElementById(
    prefix === "category" ? "categoryFilter" : "statusFilter"
  );
  const currentVal = nativeSelect.value || options[0].value;

  panel.innerHTML = options.map(o =>
    `<div class="dd-opt${o.value === currentVal ? " selected" : ""}" data-value="${o.value}">${CHECK_ICON}<span>${o.label}</span></div>`
  ).join("");
  const selected = options.find(o => o.value === currentVal) || options[0];
  label.textContent = selected.label;

  panel.querySelectorAll(".dd-opt").forEach(opt => {
    opt.addEventListener("click", () => {
      const val = opt.dataset.value;
      nativeSelect.value = val;
      panel.querySelectorAll(".dd-opt").forEach(o => o.classList.remove("selected"));
      opt.classList.add("selected");
      label.textContent = opt.textContent.trim();
      dd.classList.remove("open");
      nativeSelect.dispatchEvent(new Event("change"));
    });
  });
}

document.querySelectorAll(".dd-btn").forEach(btn => {
  btn.addEventListener("click", (e) => {
    e.stopPropagation();
    const dd = btn.closest(".dd");
    const wasOpen = dd.classList.contains("open");
    document.querySelectorAll(".dd.open").forEach(d => d.classList.remove("open"));
    if (!wasOpen) dd.classList.add("open");
  });
});
document.addEventListener("click", () => {
  document.querySelectorAll(".dd.open").forEach(d => d.classList.remove("open"));
});

function buildCategoryOptions() {
  const cats = ["全部", ...new Set(VOCAB.map(v => v.category))];
  categoryFilter.innerHTML = cats.map(c => `<option value="${c}">${c === "全部" ? "全部分類" : c}</option>`).join("");
  buildDropdown("category", cats.map(c => ({ value: c, label: c === "全部" ? "全部分類" : c })));
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) progress = JSON.parse(raw);
  } catch(e) { progress = {}; }
}

function saveProgress() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      saveIndicator.classList.add("show");
      setTimeout(() => saveIndicator.classList.remove("show"), 900);
    } catch(e) {}
    saveSummary();
  }, 250);
}
function saveSummary() {
  try {
    let known = 0, review = 0;
    VOCAB.forEach(v => {
      if (progress[v.id] === "known") known++;
      else if (progress[v.id] === "review") review++;
    });
    localStorage.setItem("n5-vocab-summary", JSON.stringify({ known, review, total: VOCAB.length }));
  } catch(e) {}
}

function matchesFilters(v) {
  const cat = categoryFilter.value;
  return cat === "全部" || v.category === cat;
}

function applyFilters() {
  const cat = categoryFilter.value;
  const stat = statusFilter.value;
  filteredList = VOCAB.filter(v => {
    if (cat !== "全部" && v.category !== cat) return false;
    const s = progress[v.id] || "new";
    if (stat !== "all" && s !== stat) return false;
    return true;
  });
  if (shuffleMode) filteredList = [...filteredList].sort(() => Math.random() - 0.5);
  currentIdx = 0;
  isFlipped = false;
  renderCard();
}

function updateStats() {
  const total = VOCAB.length;
  let known = 0, review = 0;
  VOCAB.forEach(v => {
    if (progress[v.id] === "known") known++;
    else if (progress[v.id] === "review") review++;
  });
  document.getElementById("statKnown").textContent = known;
  document.getElementById("statReview").textContent = review;
  document.getElementById("statTotal").textContent = total;
  document.getElementById("progKnown").style.width = (known/total*100) + "%";
  document.getElementById("progReview").style.width = (review/total*100) + "%";
}

const SOUND_ICON = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>';

let speaking = false;

function speak(text) {
  try {
    if (!('speechSynthesis' in window)) return;
    if (speaking) return; // 防止連點造成佇列卡死
    speaking = true;
    window.speechSynthesis.cancel();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP";
      u.rate = 0.7;
      u.onend = () => { speaking = false; };
      u.onerror = () => { speaking = false; };
      window.speechSynthesis.speak(u);
      // 保底：避免 onend/onerror 都沒觸發時鎖死按鈕
      setTimeout(() => { speaking = false; }, 4000);
    }, 60);
  } catch(e) { speaking = false; }
}

function statusColor(s) {
  if (s === "known") return "#8FA876";
  if (s === "review") return "#C17A4D";
  return "#636366";
}

function renderCard() {
  updateStats();
  if (filteredList.length === 0) {
    cardArea.innerHTML = `<div class="empty-state">這個篩選條件下沒有單字<br>試試切換分類或狀態</div>`;
    return;
  }
  const w = filteredList[currentIdx];
  const s = progress[w.id] || "new";
  cardArea.innerHTML = `
    <div class="card-counter">${currentIdx+1} / ${filteredList.length}</div>
    <div class="card-scene">
      <div class="card ${isFlipped?"flipped":""}" id="flipCard">
        <div class="face face-front">
          <span class="tag">${w.category}</span>
          <span class="status-dot" style="background:${statusColor(s)}"></span>
          <div class="word-main">${w.kanji}</div>
          <div class="tap-hint">點擊翻面看意思</div>
          <button class="sound-btn-front" id="soundBtnFront">${SOUND_ICON}</button>
        </div>
        <div class="face face-back">
          <span class="tag">${w.category}</span>
          ${w.reading !== w.kanji ? `<div class="reading">${w.reading}</div>` : ""}
          <div class="romaji">${w.romaji}</div>
          <div class="meaning">${w.meaning}</div>
          <button class="sound-btn" id="soundBtnBack">${SOUND_ICON}</button>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn-review" id="reviewBtn">需加強</button>
      <button class="btn-known" id="knownBtn">已熟悉</button>
    </div>`;
  document.getElementById("flipCard").addEventListener("click", (e) => {
    if (e.target.closest(".sound-btn") || e.target.closest(".sound-btn-front")) return;
    isFlipped = !isFlipped;
    document.getElementById("flipCard").classList.toggle("flipped", isFlipped);
  });
  document.getElementById("soundBtnFront").addEventListener("click", (e) => {
    e.stopPropagation();
    speak(w.reading || w.kanji);
  });
  document.getElementById("soundBtnBack").addEventListener("click", (e) => {
    e.stopPropagation();
    speak(w.reading || w.kanji);
  });
  document.getElementById("reviewBtn").addEventListener("click", () => markStatus(w.id, "review"));
  document.getElementById("knownBtn").addEventListener("click", () => markStatus(w.id, "known"));
}

function markStatus(id, s) {
  progress[id] = s;
  saveProgress();
  updateStats();
  goNext();
}

function goNext() {
  if (!filteredList.length) return;
  isFlipped = false;
  currentIdx = (currentIdx+1) % filteredList.length;
  renderCard();
}

function goPrev() {
  if (!filteredList.length) return;
  isFlipped = false;
  currentIdx = (currentIdx-1+filteredList.length) % filteredList.length;
  renderCard();
}

document.getElementById("nextBtn").addEventListener("click", goNext);
document.getElementById("prevBtn").addEventListener("click", goPrev);
document.getElementById("shuffleBtn").addEventListener("click", e => {
  shuffleMode = !shuffleMode;
  e.target.classList.toggle("active", shuffleMode);
  applyFilters();
});
categoryFilter.addEventListener("change", () => { closeWordModal(); applyFilters(); if (currentView==="grid") renderGrid(); });
statusFilter.addEventListener("change", applyFilters);
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("確定要清除單字卡學習進度嗎?這個動作無法復原。")) {
    progress = {};
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch(e) {}
    closeWordModal();
    updateStats();
    applyFilters();
    if (currentView==="grid") renderGrid();
    saveSummary();
  }
});

document.querySelectorAll(".mode-tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mode-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentView = btn.dataset.mode;
    closeWordModal();
    if (currentView === "flash") {
      flashView.style.display = "";
      gridView.style.display = "none";
      applyFilters();
    } else {
      flashView.style.display = "none";
      gridView.style.display = "";
      renderGrid();
    }
  });
});

const wordModalOverlay = document.getElementById("wordModalOverlay");
const wordModalCard = document.getElementById("wordModalCard");

function renderGrid() {
  const relevant = VOCAB.filter(matchesFilters);
  updateStats();
  const groups = {};
  relevant.forEach(v => {
    if (!groups[v.category]) groups[v.category] = [];
    groups[v.category].push(v);
  });
  if (Object.keys(groups).length === 0) {
    gridView.innerHTML = `<div class="empty-state">這個篩選條件下沒有單字</div>`;
    return;
  }
  let html = "";
  Object.keys(groups).forEach(key => {
    html += `<div class="grid-group"><div class="grid-group-title">${key}</div><div class="grid-cells">`;
    groups[key].forEach(v => {
      const s = progress[v.id] || "new";
      html += `<button class="grid-cell" data-id="${v.id}">
        <span class="dot" style="background:${statusColor(s)}"></span>
        <span class="k">${v.kanji}</span>
        <span class="m">${v.meaning}</span>
      </button>`;
    });
    html += `</div></div>`;
  });
  gridView.innerHTML = html;
  gridView.querySelectorAll(".grid-cell").forEach(cell => {
    cell.addEventListener("click", () => openWordModal(Number(cell.dataset.id)));
  });
}

function openWordModal(id) {
  const v = VOCAB.find(x => x.id === id);
  if (!v) return;
  const s = progress[v.id] || "new";
  const kana = v.reading || v.kanji;
  wordModalCard.innerHTML = `
    <span class="tag">${v.category}</span>
    <span class="status-dot" style="background:${statusColor(s)}"></span>
    <div class="word-main">${v.kanji}</div>
    ${v.reading && v.reading !== v.kanji ? `<div class="reading">${v.reading}</div>` : ""}
    <div class="romaji">${v.romaji || ""}</div>
    <div class="meaning">${v.meaning}</div>
    <button type="button" class="sound-btn" id="modalSoundBtn">${SOUND_ICON}</button>
    <div class="actions">
      <button type="button" class="btn-review" id="modalReviewBtn">需加強</button>
      <button type="button" class="btn-known" id="modalKnownBtn">已熟悉</button>
    </div>`;
  document.getElementById("modalSoundBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    speak(kana);
  });
  document.getElementById("modalReviewBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    progress[v.id] = "review";
    saveProgress();
    renderGrid();
    closeWordModal();
  });
  document.getElementById("modalKnownBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    progress[v.id] = "known";
    saveProgress();
    renderGrid();
    closeWordModal();
  });
  wordModalOverlay.classList.add("open");
}

function closeWordModal() {
  wordModalOverlay.classList.remove("open");
}

wordModalOverlay.addEventListener("click", (e) => {
  if (e.target === wordModalOverlay) closeWordModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeWordModal();
});

(async function init() {
  cardArea.innerHTML = `<div class="empty-state">載入中...</div>`;
  try {
    const res = await fetch("./n5-vocab.json");
    if (!res.ok) throw new Error("HTTP " + res.status);
    VOCAB = await res.json();
  } catch (e) {
    cardArea.innerHTML = `<div class="empty-state">單字資料載入失敗,請檢查網路連線後重新整理。</div>`;
    return;
  }
  buildCategoryOptions();
  buildDropdown("status", [
    { value: "all", label: "全部狀態" },
    { value: "new", label: "未學習" },
    { value: "review", label: "需加強" },
    { value: "known", label: "已熟悉" }
  ]);
  loadProgress();
  applyFilters();
  saveSummary();
})();
</script>
</body>
</html>
